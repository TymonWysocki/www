<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Test Start</title>
<style>
    body {
        margin: 0;
        background: #0f1113;
        color: white;
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #startMenu {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: 0.5s;
    }

    #startBtn {
        padding: 15px 30px;
        font-size: 22px;
        background: #2ecc71;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: white;
    }

    #game {
        display: none;
        font-size: 40px;
    }
</style>
</head>
<body>

<div id="startMenu">
    <h1>8 Ball Pool</h1>
    <button id="startBtn">Start</button>
</div>

<div id="game">
    🎱 Gra wystartowała!
</div>

<script>
    const startBtn = document.getElementById("startBtn");
    const startMenu = document.getElementById("startMenu");
    const game = document.getElementById("game");

    startBtn.addEventListener("click", () => {
        startMenu.style.opacity = "0";
        setTimeout(() => {
            startMenu.style.display = "none";
            game.style.display = "block";
        }, 500);
    });
</script>

</body>
</html>
